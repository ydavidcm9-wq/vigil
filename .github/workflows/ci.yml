name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check syntax (all JS files parse)
        run: |
          node -e "
          const fs=require('fs'),path=require('path');
          let errors=0;
          function check(d){
            fs.readdirSync(d,{withFileTypes:true}).forEach(e=>{
              const p=path.join(d,e.name);
              if(e.isDirectory()&&!['node_modules','landing','.git','test'].includes(e.name))check(p);
              else if(e.name.endsWith('.js'))try{require(p)}catch(err){
                if(err instanceof SyntaxError){console.error('Syntax error:',p,err.message);errors++}
              }
            })
          };
          check('./lib');check('./routes');
          if(errors)process.exit(1);
          console.log('All JS files parsed successfully');
          "

      - name: Run release tests
        run: npm test
