name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check syntax (all JS files parse)
        run: |
          node -e "
          const fs=require('fs'),path=require('path');
          let errors=0;
          function check(d){
            fs.readdirSync(d,{withFileTypes:true}).forEach(e=>{
              const p=path.join(d,e.name);
              if(e.isDirectory()&&!['node_modules','landing','.git'].includes(e.name))check(p);
              else if(e.name.endsWith('.js'))try{require(p)}catch(err){
                if(err instanceof SyntaxError){console.error('Syntax error:',p,err.message);errors++}
              }
            })
          };
          check('./lib');check('./routes');
          if(errors)process.exit(1);
          console.log('All JS files parsed successfully');
          "

      - name: Start server
        run: |
          node server.js &
          sleep 3

      - name: Health check
        run: curl -sf http://localhost:4100/api/health

      - name: Login and smoke test
        run: |
          TOKEN=$(curl -sf -X POST http://localhost:4100/api/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"admin"}' \
            | node -e "process.stdin.on('data',d=>{const j=JSON.parse(d);console.log(j.token||j.session||'')})")
          if [ -n "$TOKEN" ]; then
            curl -sf -b "vigil_session=$TOKEN" http://localhost:4100/api/system
            echo "Smoke test passed"
          else
            echo "Login returned no token — skipping auth tests (expected on some configs)"
          fi
