name: Feature Request
description: Suggest a new feature for Vigil
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought of?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Scanning (nmap, nuclei, trivy, nikto, SSL, DNS)
        - Vulnerability Management
        - Incident Response
        - Compliance & Reporting
        - Agents & Campaigns
        - Threat Intelligence
        - MCP Server
        - UI / Dashboard
        - AI Features
        - Docker / Deployment
        - API
        - Other
    validations:
      required: true
